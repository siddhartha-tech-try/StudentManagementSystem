services:
  - type: web
    name: student-management-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm ci --include=dev && npm run build:render
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        value: https://student-management-system-iota-one.vercel.app
      - key: MAX_FILE_SIZE_MB
        value: "2"
